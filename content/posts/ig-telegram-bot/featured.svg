    <polygon points="710,152 600,337 820,337" fill="#3d2d6e" opacity="0.3" stroke="#5f25b8" stroke-width="1"/>
    <polygon points="490,595 600,337 710,595" fill="#521080" opacity="0.4" stroke="#7c35e8" stroke-width="1.5"/>
